name: Release Packaging Assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win32
          - os: ubuntu-latest
            target: wsl
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --dev --locked

      - name: Build mcpo package
        run: uv run mcpo-package ${{ matrix.target }} --keep-build

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/packages/mcpo-${{ matrix.target }}.zip
          asset_name: mcpo-${{ matrix.target }}.zip
          asset_content_type: application/zip
